name: rd-component-publish

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install pnpm
        run: npm install -g pnpm@latest

      - name: Install dependencies (first pass to detect builds)
        run: pnpm install --no-frozen-lockfile || true
        env:
          CI: false
          PNPM_IGNORE_SCRIPTS: false

      - name: List and approve builds
        run: |
          pnpm approve-builds --list || true
          echo "y" | pnpm approve-builds  canvas esbuild core-js 2>/dev/null || true
    
      - name: Reinstall with approved builds
        run: pnpm install --no-frozen-lockfile --allow-build=esbuild --allow-build=unrs-resolver
        env:
          CI: false
          PNPM_IGNORE_SCRIPTS: false

      - name: Build
        run: pnpm run build

      - uses: JS-DevTools/npm-publish@v3
        with:
          token: ${{ secrets.NPM_TOKEN }}