name: rd-component-publish

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'  
      - name: Install pnpm
        run: npm install -g pnpm@latest

      - name: Install dependencies (first pass to detect builds)
        run: pnpm install --no-frozen-lockfile || true
        env:
          CI: false
          PNPM_IGNORE_SCRIPTS: false

      - name: List and approve builds
        run: |
          pnpm approve-builds --list || true
          echo "y" | pnpm approve-builds  canvas esbuild core-js 2>/dev/null || true
    
      - name: Reinstall with approved builds
        run: pnpm install --no-frozen-lockfile
        env:
          CI: false
          PNPM_IGNORE_SCRIPTS: false

      - run: npm install -g npm@latest

      - name: Build
        run: pnpm run build

      - uses: JS-DevTools/npm-publish@v4